<ul>

<li>Easily with little complexity</li>
<li>Providing clear insight — &quot;What changed and Why&quot;</li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-theme="uncover" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="statistical-issues">Statistical Issues</h2>
<h3 id="top-2-key-considerations-when-modeling">Top 2 key considerations when modeling:</h3>
<h4 id="sampling-bias">Sampling Bias</h4>
<ul>
<li>Empirical studies suffer from bias in observational and operational data</li>
<li>Affects inference, parameter bias, and generalizability</li>
</ul>

<h4 id="simultaneity-bias">Simultaneity Bias</h4>
<ul>
<li>Joint determination of explanatory and dependent variables</li>
<li>Examples from economics — demand pull inflation</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-theme="uncover" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="so-what-do-we-do-about-it">So what do we do about it?</h2>
<h3 id="we-need-structure">We need structure</h3>
<ul>
<li>Naive models inherit these biases — they lack economic grounding</li>
<li>A <strong>structural approach</strong> decomposes revenue into interpretable, testable components</li>
<li>Map macro forces → industry dynamics → operational drivers → financial outcomes</li>
<li>Each layer is independently observable, forecastable, auditable, and composable</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-class="divider" data-theme="uncover" lang="en-US" class="divider" data-marpit-pagination="8" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--class:divider;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="the-structural-solution">The Structural Solution</h2>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-theme="uncover" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="dynamic-systems">Dynamic Systems</h2>
<h3 id="a-structural-simplified-linear-approach">A Structural Simplified Linear Approach</h3>
<ul>
<li>Overcoming differing cyclicality — separate the pro, counter, and a-cyclical components</li>
<li>Functional form — linearizing PVM: pricing, volume, <strong>mix</strong></li>
<li>Implications and opportunities — stability and long-run forecasts
<ul>
<li>Things to monitor — market penetration, share, pricing mix, etc.</li>
</ul>
</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-theme="uncover" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="system-dynamics">System Dynamics</h2>
<h3 id="modeling-change--generating-insight-preventing-drift">Modeling Change — generating insight, preventing drift</h3>
<ul>
<li>Natural log — log-log, log-level</li>
<li>Indicator functions — technology transformations, share changes, pricing mix
<ul>
<li>Intercept/s</li>
<li>Slope/s</li>
<li>Trend</li>
</ul>
</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>

<h2 id="regression-modeling--key-concepts">Regression Modeling — key concepts</h2>
<h3 id="identification--can-feel-like-an-art-form-how-to-know-its-right">Identification — can feel like an art form, how to know it's right</h3>
<ul>
<li><strong>Specification</strong> — Functional Form drives everything downstream
<ul>
<li><strong>Omitted Variable Bias</strong> — dropping a variable biases what remains<br />
(e.g., dropping a collinear predictor that carries unique signal)</li>
<li><strong>Collinearity (VIF)</strong> — individual t-tests become unreliable;<br />
doesn't mean the model is wrong — check joint significance</li>
<li><strong>Heteroscedasticity</strong> — tells you about the DGP, not just the errors</li>
<li><strong>Autocorrelation</strong> — often the first signal of a missing variable</li>
</ul>
</li>
</ul>
<h4 id="gono-go">Go/No-Go</h4>
<ul>
<li><strong>F-Test</strong> — joint significance holds even when individual t-tests fail</li>
<li><strong>Out-of-sample validation</strong> — the only test that matters for forecasting</li>
</ul>

<h2 id="regression-modeling--key-concepts-1">Regression Modeling — key concepts</h2>
<h3 id="interpretation-and-validation">Interpretation and Validation</h3>
<ul>
<li><strong>Ceteris paribus</strong> — isolate the effect of one driver, holding others constant
<ul>
<li>The structural decomposition makes this operational, not just theoretical</li>
</ul>
</li>
<li><strong>Accuracy metrics</strong> — match the metric to the audience:
<ul>
<li><strong>MAPE</strong> for stakeholders — &quot;the forecast was off by 0.8%&quot;</li>
<li><strong>MAE</strong> for robustness — resistant to outlier distortion</li>
<li><strong>RMSE</strong> for risk — penalizes for the misses that hurt most</li>
</ul>
</li>
<li><strong>Out-of-sample accuracy is the credibility test</strong> — in-sample fit is necessary, not sufficient</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>

<h2 id="advanced-time-series-modeling">Advanced Time Series Modeling</h2>
<h3 id="stationarity--the-precondition">Stationarity — The precondition</h3>
<ul>
<li><strong>I(0) vs. I(1)</strong> — does the series revert to a mean, or drift without bound?
<ul>
<li>Get this wrong → spurious regression: high <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.048ex;" xmlns="http://www.w3.org/2000/svg" width="2.705ex" height="1.934ex" role="img" focusable="false" viewBox="0 -833.9 1195.6 854.9"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"><path data-c="1D445" d="M230 637Q203 637 198 638T193 649Q193 676 204 682Q206 683 378 683Q550 682 564 680Q620 672 658 652T712 606T733 563T739 529Q739 484 710 445T643 385T576 351T538 338L545 333Q612 295 612 223Q612 212 607 162T602 80V71Q602 53 603 43T614 25T640 16Q668 16 686 38T712 85Q717 99 720 102T735 105Q755 105 755 93Q755 75 731 36Q693 -21 641 -21H632Q571 -21 531 4T487 82Q487 109 502 166T517 239Q517 290 474 313Q459 320 449 321T378 323H309L277 193Q244 61 244 59Q244 55 245 54T252 50T269 48T302 46H333Q339 38 339 37T336 19Q332 6 326 0H311Q275 2 180 2Q146 2 117 2T71 2T50 1Q33 1 33 10Q33 12 36 24Q41 43 46 45Q50 46 61 46H67Q94 46 127 49Q141 52 146 61Q149 65 218 339T287 628Q287 635 230 637ZM630 554Q630 586 609 608T523 636Q521 636 500 636T462 637H440Q393 637 386 627Q385 624 352 494T319 361Q319 360 388 360Q466 361 492 367Q556 377 592 426Q608 449 619 486T630 554Z"></path></g><g data-mml-node="mn" transform="translate(792,363) scale(0.707)"><path data-c="32" d="M109 429Q82 429 66 447T50 491Q50 562 103 614T235 666Q326 666 387 610T449 465Q449 422 429 383T381 315T301 241Q265 210 201 149L142 93L218 92Q375 92 385 97Q392 99 409 186V189H449V186Q448 183 436 95T421 3V0H50V19V31Q50 38 56 46T86 81Q115 113 136 137Q145 147 170 174T204 211T233 244T261 278T284 308T305 340T320 369T333 401T340 431T343 464Q343 527 309 573T212 619Q179 619 154 602T119 569T109 550Q109 549 114 549Q132 549 151 535T170 489Q170 464 154 447T109 429Z"></path></g></g></g></g></svg></mjx-container>, meaningless coefficients</li>
<li>Test before modeling — ADF, KPSS</li>
</ul>
</li>
<li><strong>Modeling choice:</strong> levels (if stationary or co-integrated) vs. differences</li>
</ul>
<h3 id="co-integration--validating-the-structural-link">Co-integration — Validating the structural link</h3>
<ul>
<li>Integrated processes don't need differencing if the model captures a real equilibrium
<ul>
<li>Co-integration means the linear combination is stationary (residual)</li>
</ul>
</li>
<li><strong>Error correction</strong> — deviations from equilibrium self-correct; the forecast adapts</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>

<h2 id="advanced-time-series-modeling-1">Advanced Time Series Modeling</h2>
<h3 id="arima-errors">ARIMA errors</h3>
<ul>
<li><strong>HAC standard errors</strong> — corrects inference for heteroscedasticity and autocorrelation in one step; <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.439ex;" xmlns="http://www.w3.org/2000/svg" width="1.281ex" height="2.867ex" role="img" focusable="false" viewBox="0 -1073 566 1267"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="TeXAtom" data-mjx-texclass="ORD"><g data-mml-node="mover"><g data-mml-node="mi"><path data-c="1D6FD" d="M29 -194Q23 -188 23 -186Q23 -183 102 134T186 465Q208 533 243 584T309 658Q365 705 429 705H431Q493 705 533 667T573 570Q573 465 469 396L482 383Q533 332 533 252Q533 139 448 65T257 -10Q227 -10 203 -2T165 17T143 40T131 59T126 65L62 -188Q60 -194 42 -194H29ZM353 431Q392 431 427 419L432 422Q436 426 439 429T449 439T461 453T472 471T484 495T493 524T501 560Q503 569 503 593Q503 611 502 616Q487 667 426 667Q384 667 347 643T286 582T247 514T224 455Q219 439 186 308T152 168Q151 163 151 147Q151 99 173 68Q204 26 260 26Q302 26 349 51T425 137Q441 171 449 214T457 279Q457 337 422 372Q380 358 347 358H337Q258 358 258 389Q258 396 261 403Q275 431 353 431Z"></path></g><g data-mml-node="mo" transform="translate(366.3,279) translate(-250 0)"><path data-c="5E" d="M112 560L249 694L257 686Q387 562 387 560L361 531Q359 532 303 581L250 627L195 580Q182 569 169 557T148 538L140 532Q138 530 125 546L112 560Z"></path></g></g></g></g></g></svg></mjx-container> doesn't change</li>
<li><strong>Autocorrelation in residuals is a symptom</strong> — often signals a missing variable (OVB)
<ul>
<li>Fix the specification first; add AR terms only as a last resort</li>
</ul>
</li>
<li><strong>Parsimony</strong> — minimum lag order</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-theme="uncover" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="forecasting">Forecasting</h2>
<h3 id="forecast-uncertainty">Forecast Uncertainty</h3>
<ul>
<li><strong>Minimize model error</strong> — diagnostic rigor delivers &lt;1% cumulative MAPE on 12-month holdout</li>
<li><strong>Forecast error = model error + input forecast error</strong><br />
— negligible model error materially improves structural decomposition</li>
<li><strong>β × ΔX decomposition</strong> — attribute the forecast to each component: what moved, by how much, and why</li>
<li><strong>Macro shocks → revenue impact</strong> — calibrate a GDP or index miss directly to your bottom line</li>
<li><strong>Scenarios</strong> — &quot;what if&quot; analysis is where strategy meets forecasting</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>

<h2 id="monitoring-and-evaluation">Monitoring and Evaluation</h2>
<h3 id="evaluation--what-the-framework-enables">Evaluation — What the framework enables</h3>
<ul>
<li><strong>Performance tracking</strong> — within-year vs. full-year error, error correction, trending to plan</li>
<li><strong>Early warning</strong> — residual structure and parameter stability signal problems before the forecast misses</li>
<li><strong>Overlay adjustments</strong> — model is the baseline, layer business assumptions on top e.g., large deals, business shifts</li>
<li><strong>Model updating</strong> — drift has meaning, meaning has value; update when diagnostics dictate</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>

<h2 id="monitoring-and-evaluation-2">Monitoring and Evaluation</h2>
<h3 id="assumptions-that-cause-drift">Assumptions That Cause Drift</h3>
<ul>
<li>Share changes — if your revenue mix shifts, the index weights go stale</li>
<li>Pricing mix — changes in what's sold at what price point</li>
<li>Product mix — new products, retired products, category shifts</li>
<li>Industry composition — your segments grow at different rates</li>
<li>Regional mix — geographic exposure changes</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-footer="Bruce Hicks, AMLC Talk March 2026" data-theme="uncover" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--footer:Bruce Hicks, AMLC Talk March 2026;--theme:uncover;" data-marpit-pagination-total="32" data-size="16:9">
<h2 id="key-takeaways">Key Takeaways</h2>
<ul>
<li><strong>Structure over complexity</strong> — decompose revenue through macro → industry → operational → financial layers for interpretable, drift-resistant forecasts</li>
<li><strong>Regression rigor matters</strong> — proper identification, diagnostics, and out-of-sample validation separate credible forecasts from fragile ones</li>
<li><strong>Monitor the assumptions</strong> — share changes, pricing mix, and industry composition drift will break even well-specified models if untracked</li>
<li><strong>Communicate uncertainty</strong> — scenarios and comparison frameworks build stakeholder credibility over point forecasts</li>
</ul>
<footer>Bruce Hicks, AMLC Talk March 2026</footer>
</section>
